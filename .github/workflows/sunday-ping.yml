name: Sunday Critical Window Ping

on:
  schedule:
    # KST 19/20/21 일요일 = UTC 10/11/12 일요일 (한국 KST=UTC+9)
    - cron: '0 10 * * 0'
    - cron: '0 11 * * 0'
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
          HEALTH_PING_TOKEN: ${{ secrets.HEALTH_PING_TOKEN }}
        run: |
          if [ -z "$HEALTH_URL" ] || [ -z "$HEALTH_PING_TOKEN" ]; then
            echo "::warning::HEALTH_URL or HEALTH_PING_TOKEN not configured. Skipping."
            exit 0
          fi

          response=$(curl -sS -o response.json -w "%{http_code}" \
            -H "X-Health-Token: $HEALTH_PING_TOKEN" \
            --max-time 30 \
            "$HEALTH_URL/api/health" || echo "000")

          echo "HTTP $response"
          cat response.json || true
          echo ""

          if [ "$response" = "200" ]; then
            echo "::notice::Sunday ping OK"
          else
            echo "::error::Sunday ping FAILED with status $response"
            exit 1
          fi
