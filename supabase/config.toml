# Supabase local development config
# Used with `supabase start` (Supabase CLI)

project_id = "moneymanager"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 1800  # 30분 (자녀 inactivity timeout NFR §1.3.2)
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # 가족 단위 MVP, 이메일 확인 생략

[storage]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
